name: Build and Deploy to Azure Container Apps

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME }}
  CONTAINER_APPS_ENVIRONMENT: ${{ vars.AZURE_CONTAINER_APPS_ENVIRONMENT }}
  ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
  ACR_REPOSITORY: ${{ vars.AZURE_ACR_REPOSITORY || 'easyflex2goplus-app' }}
  STORAGE_ACCOUNT_NAME: ${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}
  STORAGE_SHARE_NAME: ${{ vars.AZURE_STORAGE_SHARE_NAME }}
  STORAGE_VOLUME_NAME: ${{ vars.AZURE_STORAGE_VOLUME_NAME || 'laravel-storage' }}
  STORAGE_MOUNT_PATH: ${{ vars.AZURE_STORAGE_MOUNT_PATH || '/var/www/html/storage' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate required configuration
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          for v in RESOURCE_GROUP CONTAINER_APP_NAME CONTAINER_APPS_ENVIRONMENT ACR_NAME ACR_REPOSITORY STORAGE_ACCOUNT_NAME STORAGE_SHARE_NAME STORAGE_VOLUME_NAME STORAGE_MOUNT_PATH; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required GitHub variable: $v"
              missing=1
            fi
          done

          if [ -z "${{ secrets.AZURE_CLIENT_ID }}" ]; then
            echo "Missing required secret: AZURE_CLIENT_ID"
            missing=1
          fi

          if [ -z "${{ secrets.AZURE_TENANT_ID }}" ]; then
            echo "Missing required secret: AZURE_TENANT_ID"
            missing=1
          fi

          if [ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "Missing required secret: AZURE_SUBSCRIPTION_ID"
            missing=1
          fi

          if [ -z "${{ secrets.APP_ENV_PROD }}" ]; then
            echo "Missing required secret: APP_ENV_PROD"
            missing=1
          fi

          if [ -z "${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}" ]; then
            echo "Missing required secret: AZURE_STORAGE_ACCOUNT_KEY"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            echo "Configuration validation failed."
            exit 1
          fi

      - name: Create .env.prod from secret
        shell: bash
        run: |
          set -euo pipefail
          printf "%s" "${{ secrets.APP_ENV_PROD }}" > .env.prod

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Azure CLI extensions
        uses: azure/CLI@v2
        with:
          inlineScript: |
            set -euo pipefail
            az config set extension.use_dynamic_install=yes_without_prompt
            az extension add --name containerapp --upgrade

      - name: Build and push image to ACR
        id: build
        uses: azure/CLI@v2
        with:
          inlineScript: |
            set -euo pipefail

            LOGIN_SERVER=$(az acr show --name "$ACR_NAME" --resource-group "$RESOURCE_GROUP" --query loginServer -o tsv)
            IMAGE_TAG="$GITHUB_SHA"
            IMAGE_REF="$LOGIN_SERVER/$ACR_REPOSITORY:$IMAGE_TAG"

            az acr build \
              --registry "$ACR_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --image "$ACR_REPOSITORY:$IMAGE_TAG" \
              .

            echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
            echo "login_server=$LOGIN_SERVER" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Container App
        id: deploy
        uses: azure/CLI@v2
        with:
          inlineScript: |
            set -euo pipefail

            IMAGE_REF="${{ steps.build.outputs.image_ref }}"
            LOGIN_SERVER="${{ steps.build.outputs.login_server }}"

            echo "Ensuring Azure Files storage is configured on Container Apps environment..."
            az containerapp env storage set \
              --name "$CONTAINER_APPS_ENVIRONMENT" \
              --resource-group "$RESOURCE_GROUP" \
              --storage-name "$STORAGE_VOLUME_NAME" \
              --azure-file-account-name "$STORAGE_ACCOUNT_NAME" \
              --azure-file-account-key "${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}" \
              --azure-file-share-name "$STORAGE_SHARE_NAME" \
              --access-mode ReadWrite

            if az containerapp show --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
              echo "Container App exists. Updating image."
              az containerapp update \
                --name "$CONTAINER_APP_NAME" \
                --resource-group "$RESOURCE_GROUP" \
                --image "$IMAGE_REF" \
                --set "template.volumes=[{\"name\":\"$STORAGE_VOLUME_NAME\",\"storageType\":\"AzureFile\",\"storageName\":\"$STORAGE_VOLUME_NAME\"}]" \
                --set "template.containers[0].volumeMounts=[{\"volumeName\":\"$STORAGE_VOLUME_NAME\",\"mountPath\":\"$STORAGE_MOUNT_PATH\"}]"
            else
              echo "Container App not found. Creating it now."

              if [ -z "${{ secrets.ACR_USERNAME }}" ] || [ -z "${{ secrets.ACR_PASSWORD }}" ]; then
                echo "For first creation, provide ACR_USERNAME and ACR_PASSWORD repository secrets."
                echo "After creation, you can move to managed identity pull if preferred."
                exit 1
              fi

              az containerapp create \
                --name "$CONTAINER_APP_NAME" \
                --resource-group "$RESOURCE_GROUP" \
                --environment "$CONTAINER_APPS_ENVIRONMENT" \
                --image "$IMAGE_REF" \
                --ingress external \
                --target-port 80 \
                --volume-mounts "$STORAGE_MOUNT_PATH=$STORAGE_VOLUME_NAME" \
                --volumes "$STORAGE_VOLUME_NAME=AzureFile,storageName=$STORAGE_VOLUME_NAME" \
                --registry-server "$LOGIN_SERVER" \
                --registry-username "${{ secrets.ACR_USERNAME }}" \
                --registry-password "${{ secrets.ACR_PASSWORD }}"
            fi

            APP_FQDN=$(az containerapp show --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)
            echo "app_url=https://$APP_FQDN" >> "$GITHUB_OUTPUT"

      - name: Deployment summary
        run: |
          echo "Deployed image: ${{ steps.build.outputs.image_ref }}"
          echo "App URL: ${{ steps.deploy.outputs.app_url }}"

      - name: Cleanup temporary files
        if: always()
        run: rm -f .env.prod
